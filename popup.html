<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Magnet Link Grabber</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="title">
      <img src="icons/icon32.png" alt="" width="20" height="20" />
      <h1>Magnet Link Grabber</h1>
    </div>
    <div class="header-actions">
      <span id="count" class="count">0</span>
      <button id="themeToggleBtn" class="theme-toggle" title="Theme: system" aria-label="Change theme">
        <svg id="systemIcon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="16" height="10.5" rx="1.5" stroke="currentColor" stroke-width="1.6" />
          <path d="M7 17.5h6M10 14.5v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
        <svg id="sunIcon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.6" />
          <path d="M10 1.5v2M10 16.5v2M18.5 10h-2M3.5 10h-2M15.7 4.3l-1.4 1.4M5.7 14.3l-1.4 1.4M15.7 15.7l-1.4-1.4M5.7 5.7L4.3 4.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
        <svg id="moonIcon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 11.5A7.5 7.5 0 1 1 8.5 3a6 6 0 0 0 8.5 8.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
        </svg>
      </button>
      <a
        id="repoLink"
        class="theme-toggle"
        href="https://github.com/quentin-rey/magnet-link-grabber"
        target="_blank"
        rel="noopener noreferrer"
        title="View GitHub repository"
        aria-label="View GitHub repository"
      >
        <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
        </svg>
      </a>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6" />
        <line x1="13.6" y1="13.6" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </svg>
      <input id="searchInput" type="text" placeholder="Search links..." autocomplete="off" />
    </div>
  </div>

  <div class="select-row">
    <label class="checkbox-wrap">
      <input type="checkbox" id="selectAllCheckbox" />
      <span id="selectAllLabel">Select all</span>
    </label>
    <div class="actions">
      <button id="copySelectedBtn" class="btn btn-secondary" disabled>Copy selection</button>
      <button id="copyAllBtn" class="btn btn-primary" disabled>Copy all</button>
    </div>
  </div>

  <p id="status" class="status">Looking for magnet links...</p>

  <ul id="linkList"></ul>

  <script src="popup.js"></script>
</body>
</html>
