<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Magnet Link Grabber</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="title">
      <img src="icons/icon32.png" alt="" width="20" height="20" />
      <h1>Liens magnet</h1>
    </div>
    <div class="header-actions">
      <span id="count" class="count">0</span>
      <button id="themeToggleBtn" class="theme-toggle" title="Changer de thème" aria-label="Changer de thème">
        <svg id="sunIcon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.6" />
          <path d="M10 1.5v2M10 16.5v2M18.5 10h-2M3.5 10h-2M15.7 4.3l-1.4 1.4M5.7 14.3l-1.4 1.4M15.7 15.7l-1.4-1.4M5.7 5.7L4.3 4.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
        <svg id="moonIcon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 11.5A7.5 7.5 0 1 1 8.5 3a6 6 0 0 0 8.5 8.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
        </svg>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6" />
        <line x1="13.6" y1="13.6" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </svg>
      <input id="searchInput" type="text" placeholder="Rechercher un lien..." autocomplete="off" />
    </div>
  </div>

  <div class="select-row">
    <label class="checkbox-wrap">
      <input type="checkbox" id="selectAllCheckbox" />
      <span id="selectAllLabel">Tout sélectionner</span>
    </label>
    <div class="actions">
      <button id="copySelectedBtn" class="btn btn-secondary" disabled>Copier la sélection</button>
      <button id="copyAllBtn" class="btn btn-primary" disabled>Copier tout</button>
    </div>
  </div>

  <p id="status" class="status">Recherche des liens magnet...</p>

  <ul id="linkList"></ul>

  <script src="popup.js"></script>
</body>
</html>
